{% extends "base.html" %}
{% block title %}Crops{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h1>🌱 Crops</h1>
    <a href="{{ url_for('add_crop') }}" class="btn btn-primary">+ Add Crop</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Crop Name</th>
          <th>Season</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for c in crops %}
        <tr>
          <td>{{ c.CropID }}</td>
          <td>{{ c.CropName }}</td>
          <td>
            <span class="badge badge-{{ c.Season | lower }}">{{ c.Season }}</span>
          </td>
          <td>
            <form action="{{ url_for('delete_crop', crop_id=c.CropID) }}" method="post" style="display:inline">
              <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Delete this crop?');">Delete</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="3" class="empty">No crops found. Add one!</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
