<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Farmer Training System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<!-- ── Navigation ── -->
<nav>
  <span class="brand">🌾 FarmTrain</span>
  <a href="{{ url_for('index') }}">Home</a>
  <a href="{{ url_for('farmers') }}">Farmers</a>
  <a href="{{ url_for('crops') }}">Crops</a>
  <a href="{{ url_for('instructors') }}">Instructors</a>
  <a href="{{ url_for('training') }}">Training</a>
  <a href="{{ url_for('farmer_training') }}">Attendance</a>
</nav>

<!-- ── Flash Messages ── -->
<div class="page" style="padding-bottom:0; padding-top:1rem;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul class="flash-list">
        {% for cat, msg in messages %}
          <li class="{{ cat }}">{{ msg }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
</div>

<!-- ── Page Content ── -->
{% block content %}{% endblock %}

</body>
</html>
