{% extends "base.html" %}
{% block title %}Add Instructor{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h1>🧑‍🏫 Add Instructor</h1>
    <a href="{{ url_for('instructors') }}" class="btn btn-outline">← Back</a>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Dr. Asha Mehta" required>
      </div>
      <div class="form-group">
        <label for="specialization">Specialization</label>
        <input type="text" id="specialization" name="specialization" placeholder="e.g. Soil Management">
      </div>
      <div class="form-group">
        <label for="organization">Organization</label>
        <input type="text" id="organization" name="organization" placeholder="e.g. ICAR Hyderabad">
      </div>
      <button type="submit" class="btn btn-primary">Save Instructor</button>
    </form>
  </div>
</div>
{% endblock %}
