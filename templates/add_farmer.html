{% extends "base.html" %}
{% block title %}Add Farmer{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h1>👨‍🌾 Add Farmer</h1>
    <a href="{{ url_for('farmers') }}" class="btn btn-outline">← Back</a>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Ravi Kumar" required>
      </div>
      <div class="form-group">
        <label for="village">Village</label>
        <input type="text" id="village" name="village" placeholder="e.g. Anantapur" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" placeholder="e.g. 9876543210">
      </div>
      <div class="form-group">
        <label for="land_area">Land Area (acres)</label>
        <input type="number" step="0.01" id="land_area" name="land_area" placeholder="e.g. 3.5">
      </div>
      <button type="submit" class="btn btn-primary">Save Farmer</button>
    </form>
  </div>
</div>
{% endblock %}
