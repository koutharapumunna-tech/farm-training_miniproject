{% extends "base.html" %}
{% block title %}Create Training{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h1>📅 Create Training Session</h1>
    <a href="{{ url_for('training') }}" class="btn btn-outline">← Back</a>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label for="crop_id">Crop</label>
        <select id="crop_id" name="crop_id" required>
          <option value="">-- Select Crop --</option>
          {% for c in crops %}
          <option value="{{ c.CropID }}">{{ c.CropName }} ({{ c.Season }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="instructor_id">Instructor</label>
        <select id="instructor_id" name="instructor_id" required>
          <option value="">-- Select Instructor --</option>
          {% for i in instructors %}
          <option value="{{ i.InstructorID }}">{{ i.Name }} — {{ i.Specialization }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="e.g. Community Hall, Guntur">
      </div>
      <button type="submit" class="btn btn-primary">Create Session</button>
    </form>
  </div>
</div>
{% endblock %}
